<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tokyo Archive</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #0f1419;
      --subtle: #536471;
      --border: #eff3f4;
      --max: 600px;
      --radius: 0px;
      --shadow: none;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    img {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    body {
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: var(--max);
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--bg);
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .header-title {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .header-subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      line-height: 1.4;
      color: var(--subtle);
    }

    .feed {
      width: 100%;
    }

    .card {
      display: block;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      transition: background-color 0.15s ease;
    }

    .card:hover {
      background: #f7f9f9;
    }

    .card-media {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 5;
      overflow: hidden;
      background: #d9d9d9;
    }

    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.28) 34%, rgba(0,0,0,0.00) 60%);
      pointer-events: none;
    }

    .card-title-wrap {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 12px;
      z-index: 1;
      pointer-events: none;
    }

    .card-number {
      display: block;
      margin: 0 0 4px;
      font-size: 12px;
      line-height: 1.2;
      font-weight: 700;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.02em;
    }

    .card-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.01em;
      text-wrap: balance;
      text-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }

    .card-meta {
      padding: 12px 14px 14px;
    }

    .card-type {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: var(--subtle);
    }

    @media (max-width: 680px) {
      .page {
        border-left: none;
        border-right: none;
      }

      .header {
        padding: 14px 16px;
      }

      .header-title {
        font-size: 19px;
      }

      .card-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="header">
      <h1 class="header-title">Tokyo Archive</h1>
      <p class="header-subtitle">Food and scenes. Fixed in place.</p>
    </header>

    <section class="feed">
      <a href="sapporo.html?v=2" class="card">
        <div class="card-media">
          <img src="/tokyo-archive/beer.jpeg" alt="Sapporo Classic Lager">
          <div class="card-overlay"></div>
          <div class="card-title-wrap">
            <span class="card-number">1</span>
            <h2 class="card-title">Sapporo Classic Lager</h2>
          </div>
        </div>
        <div class="card-meta">
          <p class="card-type">Beer</p>
        </div>
      </a>

      <!--
      次を足す時はこの形をコピペ

      <a href="yakitori.html" class="card">
        <div class="card-media">
          <img src="/tokyo-archive/yakitori.jpeg" alt="Yakitori">
          <div class="card-overlay"></div>
          <div class="card-title-wrap">
            <span class="card-number">2</span>
            <h2 class="card-title">Yakitori</h2>
          </div>
        </div>
        <div class="card-meta">
          <p class="card-type">Food</p>
        </div>
      </a>
      -->
    </section>
  </main>
</body>
</html>
