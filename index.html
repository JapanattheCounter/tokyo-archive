<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tokyo Archive</title>

<style>
body {
  margin: 40px;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* タイトル */
h1 {
  margin-bottom: 4px;
}

.subtitle {
  margin-bottom: 24px;
  color: #666;
}

/* グリッド */
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}

/* カード */
.card {
  position: relative;
  display: block;
  overflow: hidden;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: #ddd;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* タイトル（画像の上） */
.title {
  position: absolute;
  bottom: 8px;
  left: 8px;
  right: 8px;
  font-size: 14px;
  font-weight: bold;
  line-height: 1.2;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
}

/* スマホ対応 */
@media (max-width: 800px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 500px) {
  .grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<h1>Tokyo Archive</h1>
<div class="subtitle">Tokyo everyday food & scenes.</div>

<div class="grid">

  <a href="sapporo.html" class="card">
    <img src="/tokyo-archive/beer.jpeg">
    <div class="title">1. Sapporo Classic Lager</div>
  </a>

</div>

</body>
</html>
