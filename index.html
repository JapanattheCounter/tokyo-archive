<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tokyo Archive</title>
  <style>
    body {
      max-width: 560px;
      margin: 40px auto;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 8px;
    }

    .subtitle {
      margin-bottom: 28px;
      color: #555;
    }

    .card {
      position: relative;
      display: block;
      margin-bottom: 28px;
      text-decoration: none;
      color: white;
      overflow: hidden;
      border-radius: 16px;
      background: #ddd;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .title {
      position: absolute;
      left: 16px;
      bottom: 16px;
      font-size: 24px;
      font-weight: bold;
      line-height: 1.2;
      text-shadow: 0 2px 8px rgba(0,0,0,0.65);
    }

    .number {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <h1>Tokyo Archive</h1>
  <div class="subtitle">Tokyo everyday food & scenes.</div>

  <a href="sapporo.html?v=2" class="card">
    <img src="/tokyo-archive/beer.jpeg" alt="Sapporo Classic Lager">
    <div class="title">
      <span class="number">1</span>
      Sapporo Classic Lager
    </div>
  </a>

</body>
</html>
